name: Mirror GitLab release to GitHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to mirror (e.g. v3.7.11)'
        required: true

permissions:
  contents: write

jobs:
  mirror-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for GitLab release with all 6 assets
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          echo "Waiting up to 10 minutes for GitLab release $TAG with all 6 binaries..."
          for i in $(seq 1 60); do
            BODY=$(curl -s "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG")
            COUNT=$(echo "$BODY" | jq -r '.assets.links | length' 2>/dev/null || echo 0)
            echo "attempt $i/60: $COUNT assets uploaded"
            if [ "$COUNT" -ge 6 ]; then
              echo "All 6 assets ready"
              break
            fi
            sleep 10
          done

      - name: Download GitLab release assets
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          mkdir -p assets
          curl -s "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG" \
            | jq -r '.assets.links[].direct_asset_url' \
            | while read url; do
                echo "Downloading $url"
                curl -sL -o "assets/$(basename "$url")" "$url"
              done
          ls -lh assets/

      - name: Fetch GitLab release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          NOTES=$(curl -s "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG" \
            | jq -r '.description')
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: ${{ steps.notes.outputs.notes }}
          files: assets/*
