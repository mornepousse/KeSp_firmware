name: Mirror GitLab release to GitHub

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  mirror-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for GitLab release
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Waiting up to 5 minutes for GitLab release $TAG..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG")
            if [ "$STATUS" = "200" ]; then
              echo "GitLab release ready"
              break
            fi
            echo "GitLab release not ready yet (attempt $i/30, HTTP $STATUS), waiting 10s..."
            sleep 10
          done

      - name: Download GitLab release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p assets
          curl -s "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG" \
            | jq -r '.assets.links[].direct_asset_url' \
            | while read url; do
                echo "Downloading $url"
                curl -sL -o "assets/$(basename "$url")" "$url"
              done
          ls -lh assets/

      - name: Fetch GitLab release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(curl -s "https://gitlab.com/api/v4/projects/harrael%2FKeSp_firmware/releases/$TAG" \
            | jq -r '.description')
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: assets/*
